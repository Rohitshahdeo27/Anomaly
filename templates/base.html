<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medical Anomaly Monitor | Enterprise AI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: #161b22;
            --accent-blue: #00d2ff;
            --accent-red: #ff4d4d;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0; 
            padding: 0; 
        }

        /* Navigation Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #0d1117;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active { color: var(--accent-blue); }

        .container { padding: 30px; }

        /* Table Styling (Fixes VS Code Warnings) */
        .text-danger { color: var(--accent-red); font-weight: bold; }
        .text-success { color: var(--accent-blue); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--panel-bg); border-radius: 8px; overflow: hidden; }
        th { background: #0d1117; color: var(--accent-blue); padding: 15px; text-align: left; font-size: 13px; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #222; font-size: 14px; }

        /* Premium Buttons */
        .btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .btn:hover { background: var(--accent-blue); color: #fff; }
        
        .btn-danger { border-color: var(--accent-red); color: var(--accent-red); }
        .btn-danger:hover { background: var(--accent-red); color: #fff; }

        input[type="text"] {
            padding: 10px;
            background: #161b22;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
            width: 300px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav>
        <h2 style="margin:0; color:var(--accent-blue); font-weight:300;">🏥 MEDICAL MONITOR <span style="font-size:12px; color:var(--text-dim);">PRO</span></h2>
        <div class="nav-links">
            <a href="/" class="{{ 'active' if active_page == 'dashboard' }}">LIVE DASHBOARD</a>
            <a href="/history" class="{{ 'active' if active_page == 'history' }}">AUDIT HISTORY</a>
            <a href="/settings" class="{{ 'active' if active_page == 'settings' }}">SYSTEM SETTINGS</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
